<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="../dashboard/js/orcamento.js" defer></script>
    <title>Criar Orçamentos</title>
</head>

<body class="container">
    <h1 class="titulo">Criar Orçamentos</h1>
    <h2>Cliente</h2>
    <div class="busca">
        <input type="text" placeholder="Buscar por um cliente..." />
        <img src="../img/pesquisa-icon.png" alt="lupa de pesquisa" width="20" height="20" />
        <button id="cadastrarCliente">+</button>
    </div>

    <!-- Selecionar o veículo -->
    <h2>Veículo</h2>
    <div class="veiculo">
        <select name="veiculo">
            <option value="">Selecione o veículo</option>
            <option value="veiculo1">Veículo 1</option>
            <option value="veiculo2">Veículo 2</option>
            <option value="veiculo3">Veículo 3</option>
            <option value="veiculo4">Veículo 4</option>
        </select>
    </div>

    <!-- Diagnóstico do veículo -->
    <div class="diagnostico">
        <h2>Diagnóstico do veículo</h2>
        <textarea placeholder="Digite aqui"></textarea>
    </div>

    <!-- Adicionar serviços realizados -->
    <div class="servicos">
        <h2>Serviços</h2>

        <div id="listaServicos">
            <div class="linha-servico primeira-linha">
                <input type="text" placeholder="Adicionar serviço">
                <input type="text" placeholder="Mão de obra">
                <!-- Botão para adicionar serviços -->
                <button type="button" id="btnAddServico">+</button>
            </div>
        </div>
    </div>


    <!-- Adicionar peças utilizadas -->
    <div class="pecas">
        <h2>Peças</h2>

        <div id="listaPecas">
            <div class="linha-peca primeira-linha">
                <input type="text" placeholder="Peça">
                <input type="number" placeholder="Qnt.">
                <input type="text" placeholder="Valor">
                <!-- Botão para adicionar peças -->
                <button type="button" id="btnAddPeca">+</button>
            </div>
        </div>
    </div>

    <!-- Linha de separação -->
    <div class="linha"></div>

    <!-- Mecânico responsável e data do orçamento-->
    <div class="mecanico-data">
        <div class="mecanico">
            <h3>Mecânico responsável</h3>
            <input type="text" placeholder="Nome do mecânico">
        </div>
        <div class="data">
            <h3>Data</h3>
            <input type="date" name="data">
        </div>
    </div>

    <!-- Valor total do orçamento -->
    <div class="valor">
        <h4>Valor total</h4>
        <h1>R$0,00</h1>
    </div>

    <!-- Botões de ação -->
    <div class="botoes-orcamento">
        <button class="salvar">SALVAR ORÇAMENTO</button>
        <button>BAIXAR PDF</button>
        <button>ENVIAR PARA CLIENTE VIA WHATSAPP</button>
    </div>

<!-- Modal -->
    <!-- Formulário para cadastrar novo veículo -->
    <div class="overlay" id="overlay">
        <form class="form-cliente">

            <!-- Botão de fechar o formulário -->
            <span class="btn-fechar" id="btnFechar">×</span>
            <h2>Cadastrar Cliente</h2>

            <!--Dados do cliente-->
            <div class="campos-cliente">

                <div class="campo">
                    <input type="text" required>
                    <label>Nome</label>
                </div>

                <div class="linha-cliente">
                    <div class="campo">
                        <input type="tel" required>
                        <label>Telefone</label>
                    </div>

                    <div class="campo">
                        <input type="text" inputmode="numeric" required>
                        <label>CPF/CNPJ</label>
                    </div>
                </div>

                <div class="linha-cliente">
                    <div class="campo">
                        <input type="text" required>
                        <label>Bairro</label>
                    </div>

                    <div class="campo">
                        <input type="text" required>
                        <label>Rua</label>
                    </div>

                    <div class="campo">
                        <input type="text" required>
                        <label>Nº</label>
                    </div>
                </div>

            </div>

            <!--Dados do veículo-->
            <div class="campos-veiculo">
                <h2>Veículos do cliente</h2>

                <div class="linha-veiculo">
                    <div class="campo">
                        <input type="text" required>
                        <label>Placa</label>
                    </div>

                    <div class="campo">
                        <input type="text" required>
                        <label>Marca</label>
                    </div>

                    <div class="campo">
                        <input type="text" required>
                        <label>Modelo/Ano</label>
                    </div>

                    <!-- Botões de adição e exclusão de veículos -->
                    <button type="button" class="btn-excluir">Excluir</button>
                </div>

                <button type="button" id="btnAdicionar">+ Novo veículo</button>
            </div>

            <button type="submit">Cadastrar cliente</button>
        </form>
    </div>
</body>

</html>
