<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração</title>
    <link rel="stylesheet" href="style.css">
    <script src="./js/menu-lateral.js"></script>
    <!-- link para os ícones -->
    <link href="../assets/icons/css/fontawesome.css" rel="stylesheet"/>
    <link href="../assets/icons/css/solid.css" rel="stylesheet"/>
    <link href="../assets/icons/css/regular.css" rel="stylesheet"/>
</head>

<body>

    <div id="menuContainer"></div>

    <main class="configuracao">
        <!--Titulo-->
        <h1>Configurações</h1>

        <!--Fundo branco-->
        <div class="painel">

            <!--Campo para digitar-->
            <div>
                <p class="texto">Nome da oficina</p>
                <input type="text" class="campo" value="Nome da Oficina">
            </div>

            <!--Campo para digitar-->
            <div>
                <p class="texto">Telefone</p>
                <input type="text" class="campo" value="(11) 99999-9999">
            </div>

            <!--Campo para digitar-->
            <div>
                <p class="texto">Endereço</p>
                <input type="text" class="campo" value="Cidade, Rua, Bairro, N°">
            </div>

            <!--Botão-->
            <button class="botao">Editar</button>

        </div>
        <!--Link/botão-->
        <a href="../landing/index.html" class="sair">Sair</a>
    </main>

        <!-- menu inferior -->
    <div class="menuInferior">
        <a href="index.html">
            <i class="fa-solid fa-home"></i>
            <span>Início</span>
        </a>
        <a href="orcamento.html">
            <i class="fa-solid fa-plus"></i>
            <span>Novo</span>
        </a>
        <a href="servicos.html">
            <i class="fa-regular fa-clipboard"></i>
            <span>Serviços</span>
        </a>
        <a href="clientes.html">
            <i class="fa-regular fa-user"></i>
            <span>Clientes</span>
        </a>
    </div>

    <script>
        fetch("menu-lateral.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("menuContainer").innerHTML = html;

                initMenuLateral();
            });
    </script>

</body>

</html>
