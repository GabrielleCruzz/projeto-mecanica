<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração</title>
    <link rel="stylesheet" href="style.css">
    <script src="./js/menu-lateral.js"></script>
    <!-- link para os ícones -->
    <link href="../assets/icons/css/fontawesome.css" rel="stylesheet" />
    <link href="../assets/icons/css/solid.css" rel="stylesheet" />
    <link href="../assets/icons/css/regular.css" rel="stylesheet" />
</head>

<body>

    <div id="menuContainer"></div>

    <main class="configuracao">
        <!--Titulo-->
        <h1>Configurações</h1>
        <h2>Acessibilidade</h2>
        <div class="modo-escuro">
            <p>Modo escuro</p>
        </div>

        <div class="conta-editar">
            <h2>Conta</h2>
            <button id="btnEditar">Editar</button>
        </div>
        <!--Campo para digitar-->
        <div class="caixa-info">
            <p class="texto">E-mail</p>
            <input type="email" class="campo" value="emaildousuario@gmail.com">
        </div>

        <!--Campo para digitar-->
        <div class="caixa-info">
            <p class="texto">Senha</p>
            <input type="password" class="campo" value="123456789">
        </div>

        <h2>Informações</h2>
        <!--Campo para digitar-->
        <div class="caixa-info">
            <p class="texto">Nome da oficina</p>
            <input type="text" class="campo" value="Nome da oficina mecânica">
        </div>

        <div class="caixa-info">
            <p class="texto">Telefone do fornecedor</p>
            <input type="text" class="campo" value="11 9999-8888">
        </div>


        </div>
        <!--Link/botão-->
        <div class="sair">
            <a href="../landing/index.html" class="btn-sair">Desconectar
                <i class="fa-solid fa-right-from-bracket"></i></a>
        </div>
    </main>

    <!-- menu inferior -->
    <div class="menuInferior">
        <a href="index.html">
            <i class="fa-regular fa-house"></i>
            <span>Início</span>
        </a>
        <a href="orcamento.html">
            <i class="fa-solid fa-plus"></i>
            <span>Novo</span>
        </a>
        <a href="servicos.html">
            <i class="fa-regular fa-clipboard"></i>
            <span>Serviços</span>
        </a>
        <a href="clientes.html">
            <i class="fa-regular fa-user"></i>
            <span>Clientes</span>
        </a>
    </div>

    <script>
        fetch("menu-lateral.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("menuContainer").innerHTML = html;

                initMenuLateral();
            });
    </script>

</body>

</html>
