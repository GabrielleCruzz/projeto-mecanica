<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página inicial</title>
  <link rel="stylesheet" href="style.css" />
  <script src="./js/menu-lateral.js"></script>
  <!-- link para os ícones -->
  <link href="../assets/icons/css/fontawesome.css" rel="stylesheet"/>
  <link href="../assets/icons/css/solid.css" rel="stylesheet"/>
  <link href="../assets/icons/css/regular.css" rel="stylesheet"/>
</head>

<body>
  <!-- menu -->
  <div id="menuContainer"></div>

  <!-- conteúdo principal -->
  <main>
    <!-- título da página -->
    <h1>Página Inicial</h1>
    
    <!-- Barra de pesquisa -->
    <div class="pesquisa">
      <input type="text" placeholder="Busca rápida por cliente/placa..." />
      <img src="../assets/img/pesquisa-icon.png" alt="lupa de pesquisa" width="20" height="20" />
    </div>

    <!-- Resumo semanal -->
    <div class="resumo">
      <h2>Esta semana</h2>
      <!-- cards de informações -->
      <div class="info-cards">
        <div class="card">
          <span>R$0,00</span>
          <p>Rendimento</p>
        </div>
        <div class="card">
          <span>0</span>
          <p>Serviços realizados</p>
        </div>
      </div>
    </div>
    
    <!-- divisor -->
    <div class="linhabranca"></div>

    <!--Os botoes gigantes-->
    <div class="botoesprincipais">
      <a href="orcamento.html">Criar orçamento</a>
      <a href="servicos.html">Serviços</a>
    </div>

    <!--Os botoes pequenos-->
    <div class="botoesduplo">
      <a href="acervo.html">Acervo Técnico</a>
      <a href="clientes.html">Cliente</a>
    </div>
  </main>
  
  <!-- menu inferior -->
  <div class="menuInferior">
    <a href="index.html" class="atual">
      <i class="fa-solid fa-home"></i>
      <span>Início</span>
    </a>
    <a href="orcamento.html">
      <i class="fa-solid fa-plus"></i>
      <span>Novo</span>
    </a>
    <a href="servicos.html">
      <i class="fa-regular fa-clipboard"></i>
      <span>Serviços</span>
    </a>
    <a href="clientes.html">
      <i class="fa-regular fa-user"></i>
      <span>Clientes</span>
    </a>
  </div>

<script>
  fetch("menu-lateral.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("menuContainer").innerHTML = html;

    initMenuLateral();
  });
</script>

</body>
</html>
