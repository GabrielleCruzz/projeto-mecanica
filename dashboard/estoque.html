<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="style.css">
    <script src="./js/menu-lateral.js"></script>
    <!-- link para os ícones -->
    <link href="../assets/icons/css/fontawesome.css" rel="stylesheet"/>
    <link href="../assets/icons/css/solid.css" rel="stylesheet"/>
    <link href="../assets/icons/css/regular.css" rel="stylesheet"/>
    <link href="../assets/icons/css/brands.css" rel="stylesheet"/>
</head>
<body>
    <!-- menu lateral -->
    <div id="menuContainer"></div>

    <!-- conteúdo principal -->
    <main class="estoque">
        <!-- título da página -->
        <h1>Estoque</h1>
        
        <button class="btn-nova-peca" id="btn-nova-peca">+ Adicionar peça</button>

        <!-- Barra de pesquisa -->
        <div class="pesquisa">
            <input type="text" placeholder="Buscar por peça..." />
            <img src="../assets/img/pesquisa-icon.png" alt="lupa de pesquisa" width="20" height="20" />
        </div>

        <!-- filtro -->
        <div class="filtro">
            <button class="opcao selected" onclick="todos(this)">Todas</button>
            <button class="opcao" onclick="falta(this)">Em falta (1)</button>
        </div>

        <!-- peças -->
        <div class="peca-cards">
            <div class="peca-card">
                <span class="info-id">#1</span>
                <span class="info-destaque">Nome da peça</span>
                <span class="info-destaque">R$80,00</span>
                <span class="info-secundaria">Veículo compatível</span>
                <span class="info-secundaria">120x120cm</span>
                <button class="btn-qnt">1 unidades <i class="fa-solid fa-pen"></i></button>
                <button class="btn-edt">Editar</button>
            </div>
            <div class="peca-card">
                <span class="info-id">#2</span>
                <span class="info-destaque">Nome da peça</span>
                <span class="info-destaque">R$80,00</span>
                <span class="info-secundaria">Veículo compatível</span>
                <span class="info-secundaria">120x120cm</span>
                <button class="btn-qnt zero">0 unidades <i class="fa-solid fa-pen"></i></button>
                <button class="btn-edt">Editar</button>
            </div>
            
        </div>
        <button class="contato-fornecedor"><i class="fa-brands fa-whatsapp"></i> Solicitar pedido</button>
    </main>

    <!-- modal alterar quantidade no estoque -->
    <div class="overlay" id="overlayUnidades">
        <div class="form-cliente">
            <span class="btn-fechar" id="btnFecharUnidades"><i class="fa-solid fa-xmark"></i></span>
            <div class="peca-info-modal">
                <span class="info-id">#1</span>
                <span class="info-destaque">Nome da peça</span>
                <span class="info-destaque">R$80,00</span>
                <span class="info-secundaria">Veículo compatível</span>
                <span class="info-secundaria">120x120cm</span>
            </div>
            <div class="unidades">
                <span>No estoque:</span>
                <input type="number" min="0" value="0">
            </div>
            <button class="btn-nova-peca" id="salvar-unidade">Salvar alterações</button>
        </div>
    </div>

    <!-- modal adicionar peça -->
    <div class="overlay" id="overlay">
        <form class="form-cliente">
            <!-- Botão de fechar o formulário -->
            <span class="btn-fechar" id="btnFechar"><i class="fa-solid fa-xmark"></i></span>
            <h2>Adicionar peça</h2>

            <!--dados da peça-->
            <div class="campos-cliente">
                <div class="campo">
                    <input type="text" required>
                    <label>Nome da peça</label>
                </div>

                <div class="linha-cliente">
                    <div class="campo">
                        <input type="text" inputmode="numeric" required>
                        <label>Código</label>
                    </div>

                    <div class="campo">
                        <input type="text" inputmode="numeric" required>
                        <label>Preço (R$)</label>
                    </div>                    
                </div>

                <div class="campo">
                    <input type="text" required>
                    <label>Compatibidade</label>
                </div>
                
                <div class="campo">
                    <input type="tex" required>
                    <label>Tamanho/Medida (opcional)</label>
                </div>

                <div class="campo">
                    <input type="number" required>
                    <label>Quantidade no estoque</label>
                </div>                
            </div>
            <button class="btn-add-estoque" type="submit">Adicionar ao estoque</button>
        </form>
    </div>

    <!-- modal editar peça -->
    <div class="overlay" id="overlayEditar">
        <form class="form-cliente">
            <!-- Botão de fechar o formulário -->
            <span class="btn-fechar" id="btnFecharEditar"><i class="fa-solid fa-xmark"></i></span>
            <h2>Adicionar peça</h2>

            <!--dados da peça-->
            <div class="campos-cliente">
                <div class="campo">
                    <input type="text" required value="Nome da peça">
                    <label>Nome da peça</label>
                </div>

                <div class="linha-cliente">
                    <div class="campo">
                        <input type="text" inputmode="numeric" required value="#1">
                        <label>Código</label>
                    </div>

                    <div class="campo">
                        <input type="text" inputmode="numeric" required value="R$80,00">
                        <label>Preço (R$)</label>
                    </div>                    
                </div>

                <div class="campo">
                    <input type="text" required value="Veículo compatível">
                    <label>Compatibidade</label>
                </div>
                
                <div class="campo">
                    <input type="text" required value="120x120cm">
                    <label>Tamanho/Medida (opcional)</label>
                </div>

                <div class="campo">
                    <input type="number" required value="1">
                    <label>Quantidade no estoque</label>
                </div>                
            </div>
            <button class="btn-add-estoque" type="submit">Salvar alterações</button>
        </form>
    </div>

    <!-- menu inferior -->
    <div class="menuInferior">
        <a href="index.html">
            <i class="fa-solid fa-home"></i>
            <span>Início</span>
        </a>
        <a href="orcamento.html">
            <i class="fa-solid fa-plus"></i>
            <span>Novo</span>
        </a>
        <a href="servicos.html">
            <i class="fa-regular fa-clipboard"></i>
            <span>Serviços</span>
        </a>
        <a href="clientes.html">
            <i class="fa-regular fa-user"></i>
            <span>Clientes</span>
        </a>
    </div>

    <!-- script modal adicionar peça -->
    <script>
        const btnAdd = document.getElementById("btn-nova-peca");
        const overlay = document.getElementById("overlay");
        const btnFechar = document.getElementById("btnFechar");

        // Eventos de abrir e fechar o modal
        btnAdd.onclick = abrirModal;
        btnFechar.onclick = fecharModal;

        // Abre o modal e trava o scroll da página
        function abrirModal() {
            overlay.style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        // Fecha o modal e libera o scroll da página
        function fecharModal() {
            overlay.style.display = "none";
            document.body.style.overflow = "auto";
        }
    </script>

    <!-- script modal atualizar quantidade -->
    <script>
        const btnQnt = document.querySelectorAll(".btn-qnt");
        const overlayUnidades = document.getElementById("overlayUnidades");
        const btnFecharUnidades = document.getElementById("btnFecharUnidades");

        // Eventos de abrir e fechar o modal
        btnQnt.forEach(btn => {
            btn.onclick = abrirQnt;
        });
        btnFecharUnidades.onclick = fecharQnt;

        // Abre o modal e trava o scroll da página
        function abrirQnt() {
            overlayUnidades.style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        // Fecha o modal e libera o scroll da página
        function fecharQnt() {
            overlayUnidades.style.display = "none";
            document.body.style.overflow = "auto";
        }
    </script>

    <!-- script modal editar peça -->
    <script>
        const btnEditar = document.querySelectorAll(".btn-edt");
        const overlayEditar = document.getElementById("overlayEditar");
        const btnFecharEditar = document.getElementById("btnFecharEditar");

        // Eventos de abrir e fechar o modal
        btnEditar.forEach(btn => {
            btn.onclick = abrirEditar;
        });
        btnFecharEditar.onclick = fecharEditar;

        // Abre o modal e trava o scroll da página
        function abrirEditar() {
            overlayEditar.style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        // Fecha o modal e libera o scroll da página
        function fecharEditar() {
            overlayEditar.style.display = "none";
            document.body.style.overflow = "auto";
        }
    </script>

    <!-- seleção de filtro -->
    <script>
        const contato = document.querySelector(".contato-fornecedor");
        const divCards = document.querySelector(".peca-cards");
        const cards = document.querySelectorAll(".peca-card");
        const filtros = document.querySelectorAll(".opcao");
        function falta(btn) {            
            cards.forEach(card => {
                card.querySelector(".zero") ? card.style.display = 'flex' : card.style.display = 'none';
            });
            filtros.forEach(filtro => {
                filtro.className = "opcao";
            });
            btn.className = "opcao selected";
            
            contato.style.display = "block";
        }
        
        function todos(btn) {
            cards.forEach(card => {
                card.style.display = 'flex';
            });
            filtros.forEach(filtro => {
                filtro.className = "opcao";
            });
            btn.className = "opcao selected";
            
            contato.style.display = "none";
        }    
    </script>

    <!-- script incluir menu lateral -->
    <script>
        fetch("menu-lateral.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("menuContainer").innerHTML = html;

            initMenuLateral();
        });

        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }
    </script>
</body>
</html>
